name: Deploy Web build to itch.io

on:
  push:
    branches: [main]
  workflow_dispatch:

# Let a later PR re-run this workflow on the PR's commit if needed.
concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

# The push to itch.io needs the butler secret. Builds are uploaded to the
# Actions run as artifacts regardless, so the workflow is useful even before
# you add the secret.
permissions:
  contents: read

env:
  GODOT_VERSION: "4.3"
  GODOT_CPP_BRANCH: "godot-4.3-stable"
  ITCH_USER: micropixelx
  ITCH_GAME: aetherforgev
  ITCH_CHANNEL: html

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 1. Build the GDExtension C++ library for Web using Emscripten.
      #    Output lands in addons/aetherforgev/bin/aetherforgev.web.*.wasm
      # -----------------------------------------------------------------------
      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: "3.1.63"
          actions-cache-folder: emsdk-cache

      - name: Verify Emscripten
        run: emcc --version

      - name: Cache godot-cpp
        uses: actions/cache@v4
        with:
          path: godotcpp
          key: godotcpp-${{ env.GODOT_CPP_BRANCH }}

      - name: Clone godot-cpp
        run: |
          if [ ! -d godotcpp ]; then
            git clone --depth 1 -b "$GODOT_CPP_BRANCH" https://github.com/godotengine/godot-cpp godotcpp
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SCons
        run: python -m pip install --upgrade scons

      - name: Build GDExtension library (Web)
        run: scons platform=web target=template_release production=yes -j$(nproc)

      # -----------------------------------------------------------------------
      # 2. Run Godot headless and export the Web build using export_presets.cfg.
      #    Templates come from the GodotSetup action below.
      # -----------------------------------------------------------------------
      - name: Set up Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: ${{ env.GODOT_VERSION }}
          # Loads the matching Web export template so --export-release works.
          templates: true
          export-templates: true

      - name: Verify Godot
        run: godot --version

      - name: Export Web build
        run: |
          mkdir -p export
          godot --headless --export-release "Web" export/index.html

      - name: Verify export
        run: |
          test -f export/index.html
          test -f export/index.wasm
          ls -la export

      # -----------------------------------------------------------------------
      # 3. Upload the Web build to itch.io via butler, and also keep it as a
      #    workflow artifact so you can grab it even before adding the secret.
      # -----------------------------------------------------------------------
      - name: Upload export as artifact
        uses: actions/upload-artifact@v4
        with:
          name: aetherforgev-web
          path: export/
          if-no-files-found: error

      - name: Set up butler
        if: ${{ env.BUTLER_API_KEY != '' }}
        run: |
          curl -L -o butler.zip https://broth.itch.ovh/butler/linux-amd64/LATEST.zip
          unzip butler.zip
          chmod +x butler
          ./butler --version

      - name: Push to itch.io
        if: ${{ env.BUTLER_API_KEY != '' && github.ref == 'refs/heads/main' }}
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          ./butler push export "${ITCH_USER}/${ITCH_GAME}:${ITCH_CHANNEL}"
          echo "::notice::Live at https://${ITCH_USER}.itch.io/${ITCH_GAME}"
